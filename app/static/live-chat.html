<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Chat — Lorma Library</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f9; color: #333; line-height: 1.5; }
    header { background: #2c3e50; color: #fff; padding: 14px 24px; text-align: center; }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .name-card { background: #fff; border-radius: 8px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); margin-top: 40px; text-align: center; }
    .name-card h2 { font-size: 1.1rem; color: #2c3e50; margin-bottom: 16px; }
    .name-card input { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; margin-bottom: 14px; }
    .name-card button { width: 100%; padding: 10px; border: none; border-radius: 4px; background: #2c3e50; color: #fff; font-size: 0.95rem; cursor: pointer; }
    .name-card button:hover { background: #34495e; }

    /* Queue picker */
    .queue-view { max-width: 600px; margin: 0 auto; padding: 20px; }
    .queue-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .queue-header h2 { font-size: 1.05rem; color: #2c3e50; }
    .queue-header .refresh-btn { padding: 6px 14px; border: 1px solid #ccc; border-radius: 4px; background: #fff; font-size: 0.82rem; cursor: pointer; color: #555; }
    .queue-header .refresh-btn:hover { background: #f4f6f9; }
    .queue-list { display: flex; flex-direction: column; gap: 10px; }
    .queue-card { background: #fff; border-radius: 8px; padding: 16px 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: 2px solid transparent; display: flex; align-items: center; justify-content: space-between; gap: 12px; transition: border-color 0.15s; }
    .queue-card:hover { border-color: #2c3e50; }
    .queue-card.claimed { opacity: 0.6; }
    .queue-card-info { flex: 1; min-width: 0; }
    .queue-card-name { font-weight: 600; font-size: 0.95rem; color: #2c3e50; }
    .queue-card-meta { font-size: 0.8rem; color: #7f8c8d; margin-top: 2px; }
    .queue-card-status { font-size: 0.78rem; padding: 3px 10px; border-radius: 12px; white-space: nowrap; }
    .status-waiting { background: #fef3cd; color: #856404; }
    .status-claimed { background: #d1e7dd; color: #0a5c36; }
    .queue-join-btn { padding: 8px 18px; border: none; border-radius: 6px; background: #2c3e50; color: #fff; font-size: 0.85rem; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .queue-join-btn:hover { background: #34495e; }
    .queue-join-btn:disabled { background: #aaa; cursor: not-allowed; }
    .queue-empty { text-align: center; color: #7f8c8d; padding: 40px 20px; font-size: 0.9rem; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

    /* Chat view */
    .chat-header { background: #fff; padding: 12px 16px; border-bottom: 1px solid #ecf0f1; font-size: 0.9rem; color: #2c3e50; display: flex; align-items: center; justify-content: space-between; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; background: #f4f6f9; }
    .msg { margin-bottom: 12px; max-width: 85%; }
    .msg-user { margin-right: auto; }
    .msg-user .bubble { background: #ecf0f1; color: #333; border-radius: 12px 12px 12px 0; padding: 10px 14px; }
    .msg-librarian { margin-left: auto; }
    .msg-librarian .bubble { background: #2c3e50; color: #fff; border-radius: 12px 12px 0 12px; padding: 10px 14px; }
    .msg-assistant .bubble { background: #f9e9cf; color: #333; border-radius: 12px; padding: 10px 14px; }
    .msg-label { font-size: 0.72rem; color: #7f8c8d; margin-bottom: 3px; }
    .msg-librarian .msg-label { text-align: right; }
    .input-bar { display: flex; gap: 8px; padding: 12px 16px; background: #fff; border-top: 1px solid #ecf0f1; }
    .input-bar input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; }
    .input-bar input:focus { border-color: #2c3e50; outline: none; }
    .input-bar button { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
    #send-btn { background: #2c3e50; color: #fff; }
    #send-btn:hover { background: #34495e; }
    .hidden { display: none !important; }
    .empty-state { text-align: center; color: #7f8c8d; padding: 40px 20px; font-size: 0.9rem; }
    .back-to-queue { padding: 6px 14px; border: 1px solid #ccc; border-radius: 4px; background: #fff; font-size: 0.82rem; cursor: pointer; color: #555; }
    .back-to-queue:hover { background: #f4f6f9; }
  </style>
</head>
<body>
  <header><h1>📚 Lorma Library — Live Chat</h1></header>

  <!-- Step 1: Name prompt -->
  <div class="container" id="name-view">
    <div class="name-card">
      <h2>💬 Enter your name to continue</h2>
      <input type="text" id="lc-name" placeholder="Your name (e.g. Maria Santos)" autofocus>
      <button id="lc-join-btn" type="button">Continue</button>
    </div>
  </div>

  <!-- Step 2: Queue picker (shown when no specific session in URL) -->
  <div id="queue-view" class="hidden">
    <div class="queue-view">
      <div class="queue-header">
        <h2>📋 Select a patron to help</h2>
        <button class="refresh-btn" id="queue-refresh-btn" type="button">↻ Refresh</button>
      </div>
      <div class="queue-list" id="queue-list">
        <div class="queue-empty">Loading sessions…</div>
      </div>
    </div>
  </div>

  <!-- Step 3: Chat view -->
  <div id="chat-view" class="hidden" style="height:calc(100vh - 52px);display:flex;flex-direction:column">
    <div class="chat-header">
      <span id="chat-status">Connecting…</span>
      <div style="display:flex;gap:8px">
        <button class="back-to-queue hidden" id="back-to-queue-btn" type="button">← Queue</button>
        <button id="end-btn" type="button" style="padding:6px 14px;border:none;border-radius:4px;background:#e74c3c;color:#fff;font-size:0.8rem;cursor:pointer">End Chat</button>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="empty-state">Loading messages…</div>
    </div>
    <div class="input-bar" id="input-bar">
      <input type="text" id="reply-input" placeholder="Type your reply…" aria-label="Reply to patron">
      <button id="send-btn" type="button">Send</button>
    </div>
  </div>

<script>
(function() {
  var apiKey = "__INJECTED_API_KEY__";

  var nameView    = document.getElementById("name-view");
  var queueView   = document.getElementById("queue-view");
  var chatView    = document.getElementById("chat-view");
  var nameInput   = document.getElementById("lc-name");
  var joinBtn     = document.getElementById("lc-join-btn");
  var queueList   = document.getElementById("queue-list");
  var chatStatus  = document.getElementById("chat-status");
  var chatMessages= document.getElementById("chat-messages");
  var replyInput  = document.getElementById("reply-input");
  var sendBtn     = document.getElementById("send-btn");
  var endBtn      = document.getElementById("end-btn");
  var backBtn     = document.getElementById("back-to-queue-btn");
  var refreshBtn  = document.getElementById("queue-refresh-btn");

  var myName = "";
  var sessionId = "";
  var liveChatId = "";
  var pollTimer = null;
  var queuePollTimer = null;

  var params = new URLSearchParams(window.location.search);
  var urlSession = params.get("session") || "";
  var urlName    = params.get("name") || "";

  var STORE_KEY = "lc_librarian_name";
  var storedName = localStorage.getItem(STORE_KEY) || "";
  var initialName = urlName || storedName;
  if (initialName) nameInput.value = initialName;

  joinBtn.addEventListener("click", startChat);
  nameInput.addEventListener("keydown", function(e) { if (e.key === "Enter") startChat(); });
  refreshBtn.addEventListener("click", function() { loadQueue(); });
  backBtn.addEventListener("click", function() { showQueueView(); });

  // Auto-proceed if name is known
  if (initialName) startChat();

  function startChat() {
    myName = nameInput.value.trim();
    if (!myName) { nameInput.style.borderColor = "#e74c3c"; nameInput.focus(); return; }
    localStorage.setItem(STORE_KEY, myName);

    // Keep ?name= in the URL so it survives a page refresh (localStorage may not always be available)
    if (window.history.replaceState) {
      var clean = window.location.pathname + "?name=" + encodeURIComponent(myName);
      window.history.replaceState({}, "", clean);
    }

    nameView.classList.add("hidden");

    if (urlSession) {
      // Came from a specific session email link — go straight to that session
      sessionId = urlSession;
      showChatView();
      joinSession();
    } else {
      // Came from "View Live Chat Queue" — show the picker
      showQueueView();
    }
  }

  // ----------------------------------------------------------------
  // Queue picker
  // ----------------------------------------------------------------

  function showQueueView() {
    stopPoll();
    chatView.classList.add("hidden");
    queueView.classList.remove("hidden");
    sessionId = "";
    liveChatId = "";
    loadQueue();
    // Auto-refresh queue every 8s
    if (queuePollTimer) clearInterval(queuePollTimer);
    queuePollTimer = setInterval(loadQueue, 8000);
  }

  async function loadQueue() {
    try {
      var resp = await fetch("/admin/api/handoff-sessions?page_size=50", { headers: { "X-Admin-Key": apiKey } });
      var data = await resp.json();
      renderQueue(data.sessions || []);
    } catch(e) {
      queueList.innerHTML = '<div class="queue-empty">Error loading sessions.</div>';
    }
  }

  function renderQueue(sessions) {
    if (!sessions.length) {
      queueList.innerHTML = '<div class="queue-empty">No active patron requests right now.<br>This page refreshes automatically.</div>';
      return;
    }
    queueList.innerHTML = "";
    sessions.forEach(function(s) {
      var isMine = s.staff_username && s.staff_username === myName;
      var isClaimed = !!s.staff_username && !isMine;
      var card = document.createElement("div");
      card.className = "queue-card" + (isClaimed ? " claimed" : "");

      var statusHtml = isMine
        ? '<span class="queue-card-status status-claimed">You (active)</span>'
        : isClaimed
          ? '<span class="queue-card-status status-claimed">With ' + esc(s.staff_username) + '</span>'
          : '<span class="queue-card-status status-waiting">⏳ Waiting</span>';

      var msgCount = s.message_count || 0;
      var timeAgo = s.last_activity ? fmtAgo(s.last_activity) : "";

      card.innerHTML =
        '<div class="queue-card-info">' +
          '<div class="queue-card-name">' + esc(s.display_name || s.session_id.substring(0, 16) + "…") + '</div>' +
          '<div class="queue-card-meta">' + msgCount + ' messages' + (timeAgo ? ' · ' + timeAgo : '') + '</div>' +
        '</div>' +
        statusHtml +
        '<button class="queue-join-btn"' + (isClaimed ? ' disabled' : '') + '>' +
          (isMine ? 'Rejoin' : isClaimed ? 'Taken' : 'Join Chat') +
        '</button>';

      if (!isClaimed) {
        card.querySelector(".queue-join-btn").addEventListener("click", function() {
          if (queuePollTimer) { clearInterval(queuePollTimer); queuePollTimer = null; }
          sessionId = s.session_id;
          liveChatId = s.live_chat_id;
          showChatView();
          claimAndStart();
        });
      }

      queueList.appendChild(card);
    });
  }

  function fmtAgo(ts) {
    var diff = Math.floor(Date.now() / 1000 - ts);
    if (diff < 60) return diff + "s ago";
    if (diff < 3600) return Math.floor(diff / 60) + "m ago";
    return Math.floor(diff / 3600) + "h ago";
  }

  // ----------------------------------------------------------------
  // Chat view
  // ----------------------------------------------------------------

  function showChatView() {
    queueView.classList.add("hidden");
    chatView.classList.remove("hidden");
    chatView.style.display = "flex";
    // Show back button only when there's no specific session in URL
    // (i.e. they came from the queue picker, not a direct email link)
    if (!urlSession) {
      backBtn.classList.remove("hidden");
    }
  }

  async function joinSession() {
    try {
      var resp = await fetch("/admin/api/handoff-sessions?page_size=50", { headers: { "X-Admin-Key": apiKey } });
      var data = await resp.json();
      var sessions = data.sessions || [];
      var match = sessions.find(function(s) { return s.session_id === sessionId; });
      if (match) {
        liveChatId = match.live_chat_id;
        if (match.staff_username && match.staff_username !== myName) {
          chatStatus.textContent = "";
          chatMessages.innerHTML =
            '<div class="empty-state">' +
            '<div style="font-size:1.5em;margin-bottom:12px">✅</div>' +
            '<div style="font-size:1.05em;color:#2c3e50;margin-bottom:8px">This session is already being handled</div>' +
            '<div style="color:#7f8c8d">Another librarian is chatting with the patron.</div>' +
            '</div>';
          document.getElementById("input-bar").style.display = "none";
          endBtn.style.display = "none";
          return;
        }
        await claimAndStart();
      } else {
        chatStatus.textContent = "Session ended or not found";
        chatMessages.innerHTML = '<div class="empty-state">This session may have already ended or been handled by another librarian.</div>';
      }
    } catch(e) { chatStatus.textContent = "Error connecting"; }
  }

  async function claimAndStart() {
    // Reset per-session state so messages load cleanly for the new session
    lastRenderedTs = 0;
    _libSeenIds = new Set();
    chatMessages.innerHTML = '<div class="empty-state">Loading messages…</div>';
    document.getElementById("input-bar").style.display = "";
    endBtn.style.display = "";
    try {
      var resp = await fetch("/admin/api/live-chat/" + encodeURIComponent(liveChatId) + "/claim", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Admin-Key": apiKey },
        body: JSON.stringify({ username: myName })
      });
      if (resp.status === 409) {
        var d = await resp.json();
        if (d.claimed_by && d.claimed_by !== myName) {
          chatStatus.textContent = "";
          chatMessages.innerHTML =
            '<div class="empty-state">' +
            '<div style="font-size:1.5em;margin-bottom:12px">✅</div>' +
            '<div style="font-size:1.05em;color:#2c3e50;margin-bottom:8px">This session is already being handled</div>' +
            '<div style="color:#7f8c8d">Another librarian is chatting with the patron.</div>' +
            '</div>';
          document.getElementById("input-bar").style.display = "none";
          endBtn.style.display = "none";
          return;
        }
      }
      chatStatus.innerHTML = "Connected as <strong>" + esc(myName) + "</strong>";
    } catch(e) { chatStatus.textContent = "Connected"; }
    await loadPatronInfo();
    for (var _attempt = 0; _attempt < 3; _attempt++) {
      await loadMessages();
      if (lastRenderedTs > 0) break;
      await new Promise(function(r) { setTimeout(r, 1500); });
    }
    startPoll();
    _initAblyLibrarian(liveChatId);
    replyInput.focus();
  }

  async function loadPatronInfo() {
    if (!liveChatId) return;
    try {
      var resp = await fetch("/admin/api/live-chat/" + encodeURIComponent(liveChatId) + "/patron-info", { headers: { "X-Admin-Key": apiKey } });
      var data = await resp.json();
      renderPatronCard(data);
    } catch(e) {}
  }

  function renderPatronCard(info) {
    var existing = document.getElementById("patron-identity-card");
    if (existing) existing.remove();
    if (!info || !info.patron_type) return;
    var card = document.createElement("div");
    card.id = "patron-identity-card";
    card.style.cssText =
      "background:linear-gradient(135deg,#0E553F,#1a7a5a);color:#fff;padding:12px 16px;" +
      "font-size:0.85rem;display:flex;align-items:center;gap:10px;flex-shrink:0;";
    card.innerHTML =
      '<span style="font-size:1.3em">👤</span>' +
      '<div>' +
        '<div style="font-weight:600;font-size:0.9em">' + esc(info.patron_type) + '</div>' +
        (info.patron_details ? '<div style="opacity:0.88;font-size:0.82em">' + esc(info.patron_details) + '</div>' : '') +
      '</div>';
    chatMessages.parentNode.insertBefore(card, chatMessages);
  }

  var lastRenderedTs = 0;
  var _libSeenIds = new Set();
  var _ablyClient = null;

  function _initAblyLibrarian(lcId) {
    fetch("/api/ably-token")
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (!d.key) return;
        function connect(key) {
          try {
            if (_ablyClient) { try { _ablyClient.close(); } catch(e) {} }
            _ablyClient = new Ably.Realtime({ key: key, recover: function(_, cb) { cb(true); } });
            var ch = _ablyClient.channels.get("live-chat:" + lcId);
            ch.subscribe("message", function(msg) {
              if (msg.data) appendNewMessages([msg.data]);
            });
            ch.subscribe("status", function(msg) {
              if (msg.data && msg.data.status === "ended") {
                chatStatus.textContent = "Chat has ended";
                document.getElementById("input-bar").style.display = "none";
                stopPoll();
                localStorage.removeItem("lc_librarian_session");
              }
            });
          } catch(e) {}
        }
        if (typeof Ably !== "undefined") {
          connect(d.key);
        } else {
          var s = document.createElement("script");
          s.src = "https://cdn.ably.com/lib/ably.min-2.js";
          s.onload = function() { connect(d.key); };
          document.head.appendChild(s);
        }
      })
      .catch(function() {});
  }

  async function loadMessages() {
    if (!liveChatId) return;
    try {
      var url = "/admin/api/live-chat/" + encodeURIComponent(liveChatId) + "/messages";
      if (lastRenderedTs > 0) url += "?since=" + lastRenderedTs;
      var resp = await fetch(url, { headers: { "X-Admin-Key": apiKey } });
      var data = await resp.json();
      appendNewMessages(data.messages || []);
      if (data.status === "ended") {
        chatStatus.textContent = "Chat has ended";
        document.getElementById("input-bar").style.display = "none";
        stopPoll();
        localStorage.removeItem("lc_librarian_session");
      }
    } catch(e) {}
  }

  function appendNewMessages(msgs) {
    var empty = chatMessages.querySelector(".empty-state");
    var newMsgs = msgs.filter(function(m) {
      var key = m.id != null ? ("id:" + m.id) : (m.timestamp + "|" + m.content);
      return !_libSeenIds.has(key);
    });
    if (!newMsgs.length) return;
    if (empty) empty.remove();
    newMsgs.forEach(function(m) {
      var key = m.id != null ? ("id:" + m.id) : (m.timestamp + "|" + m.content);
      _libSeenIds.add(key);
      if (m.timestamp > lastRenderedTs) lastRenderedTs = m.timestamp;
      if (m.role === "librarian") {
        var optimistics = chatMessages.querySelectorAll(".msg-optimistic");
        for (var i = 0; i < optimistics.length; i++) {
          if (optimistics[i].dataset.optimisticText === m.content) {
            optimistics[i].classList.remove("msg-optimistic");
            return;
          }
        }
      }
      var div = document.createElement("div");
      var cls = "msg ";
      var label = "";
      if (m.role === "user") { cls += "msg-user"; label = "👤 Patron"; }
      else if (m.role === "librarian") { cls += "msg-librarian"; label = "👩‍💼 Librarian"; }
      else { cls += "msg-assistant"; label = "🤖 Bot"; }
      var time = m.timestamp ? new Date(m.timestamp * 1000).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}) : "";
      div.className = cls;
      div.innerHTML = '<div class="msg-label">' + label + " · " + time + '</div><div class="bubble">' + esc(m.content) + '</div>';
      chatMessages.appendChild(div);
    });
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML.replace(/\n/g, "<br>"); }
  function startPoll() { stopPoll(); pollTimer = setInterval(function() { loadMessages(); checkPatronTyping(); }, 5000); }
  function stopPoll() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }

  async function checkPatronTyping() {
    if (!liveChatId) return;
    try {
      var resp = await fetch("/admin/api/live-chat/" + encodeURIComponent(liveChatId) + "/typing", { headers: { "X-Admin-Key": apiKey } });
      var data = await resp.json();
      var el = document.getElementById("patron-typing-indicator");
      if (data.patron_typing) {
        if (!el) {
          el = document.createElement("div");
          el.id = "patron-typing-indicator";
          el.style.cssText = "padding:6px 14px;font-size:0.82em;color:#7f8c8d;font-style:italic";
          el.textContent = "Patron is typing…";
          chatMessages.appendChild(el);
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }
      } else if (el) { el.remove(); }
    } catch(e) {}
  }

  sendBtn.addEventListener("click", sendReply);
  replyInput.addEventListener("keydown", function(e) { if (e.key === "Enter") { e.preventDefault(); sendReply(); } });

  var lastLibTyping = 0;
  replyInput.addEventListener("input", function() {
    if (!liveChatId || !replyInput.value.trim()) return;
    var now = Date.now();
    if (now - lastLibTyping > 1500) {
      lastLibTyping = now;
      fetch("/admin/api/live-chat/" + encodeURIComponent(liveChatId) + "/typing", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Admin-Key": apiKey },
        body: JSON.stringify({ role: "librarian" })
      }).catch(function(){});
    }
  });

  async function sendReply() {
    var text = replyInput.value.trim();
    if (!text || !liveChatId) return;
    replyInput.value = "";
    var div = document.createElement("div");
    div.className = "msg msg-librarian msg-optimistic";
    div.dataset.optimisticText = text;
    var time = new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
    div.innerHTML = '<div class="msg-label" style="text-align:right">👩‍💼 ' + esc(myName) + ' · ' + time + '</div><div class="bubble">' + esc(text) + '</div>';
    var statusSpan = document.createElement("span");
    statusSpan.style.cssText = "font-size:.7rem;opacity:.5;display:block;text-align:right;margin-top:2px;padding-right:2px";
    statusSpan.textContent = "Sending…";
    div.appendChild(statusSpan);
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    try {
      var resp = await fetch("/admin/api/live-chat/" + encodeURIComponent(liveChatId) + "/reply", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Admin-Key": apiKey },
        body: JSON.stringify({ message: text, sender_name: myName })
      });
      statusSpan.textContent = resp.ok ? "✓ Sent" : "✗ Failed";
      if (!resp.ok) statusSpan.style.color = "#e74c3c";
    } catch(e) {
      statusSpan.textContent = "✗ Failed";
      statusSpan.style.color = "#e74c3c";
    }
    replyInput.focus();
  }

  endBtn.addEventListener("click", async function() {
    if (!liveChatId) return;
    if (!confirm("End this chat? The patron will be returned to the bot.")) return;
    try {
      await fetch("/admin/api/live-chat/" + encodeURIComponent(liveChatId) + "/end", {
        method: "POST", headers: { "X-Admin-Key": apiKey }
      });
      chatStatus.textContent = "Chat ended";
      document.getElementById("input-bar").style.display = "none";
      stopPoll();
      localStorage.removeItem("lc_librarian_session");
      // Go back to queue after ending
      if (!urlSession) {
        setTimeout(function() { showQueueView(); }, 1500);
      }
    } catch(e) {}
  });
})();
</script>
</body>
</html>
