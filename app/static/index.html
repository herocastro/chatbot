<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Assistant</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f0ebe3;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 12px;
  }

  #chat-container {
    width: 100%;
    max-width: 500px;
    height: 90vh;
    max-height: 700px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #chat-header {
    background: #3a506b;
    color: #fff;
    padding: 16px 20px;
    font-size: 1.1rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  #chat-header .icon { font-size: 1.3rem; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #fafaf7;
  }

  .message {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 0.95rem;
    line-height: 1.45;
    word-wrap: break-word;
    white-space: pre-wrap;
  }

  .message.user {
    align-self: flex-end;
    background: #3a506b;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .message.bot {
    align-self: flex-start;
    background: #e8e4de;
    color: #2d2d2d;
    border-bottom-left-radius: 4px;
  }

  .message.error {
    align-self: center;
    background: #fce4e4;
    color: #a94442;
    border-radius: 8px;
    font-size: 0.88rem;
    text-align: center;
  }

  .typing-indicator {
    align-self: flex-start;
    display: flex;
    gap: 5px;
    padding: 10px 14px;
    background: #e8e4de;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
  }

  .typing-indicator span {
    width: 8px;
    height: 8px;
    background: #999;
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

  #input-area {
    display: flex;
    padding: 12px;
    gap: 8px;
    border-top: 1px solid #e0dcd5;
    background: #fff;
    flex-shrink: 0;
  }

  #message-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #ccc;
    border-radius: 20px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  #message-input:focus { border-color: #3a506b; }

  #send-btn {
    background: #3a506b;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  #send-btn:hover { background: #2c3e50; }
  #send-btn:disabled { background: #a0aab4; cursor: not-allowed; }

  .welcome {
    text-align: center;
    color: #777;
    font-size: 0.9rem;
    padding: 20px 10px;
    line-height: 1.5;
  }

  .faqs { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; padding: 8px 10px 14px; }
  .faq-btn { background: #fff; color: #3a506b; border: 1px solid #3a506b; border-radius: 18px; padding: 7px 14px; font-size: 0.82rem; cursor: pointer; transition: background 0.15s; line-height: 1.3; }
  .faq-btn:hover { background: #eef2f7; }

  @media (max-width: 540px) {
    body { padding: 0; }
    #chat-container {
      max-width: 100%;
      height: 100vh;
      max-height: none;
      border-radius: 0;
    }
  }
</style>
</head>
<body>
<div id="chat-container">
  <div id="chat-header">
    <span class="icon" aria-hidden="true">&#128218;</span>
    <span>Hero — Library Assistant</span>
  </div>
  <div id="messages" role="log" aria-live="polite">
    <div class="welcome">
      Hi, I'm Hero! 👋 I can help you find books, check hours, or answer questions about the library. What can I do for you?
    </div>
    <div class="faqs" id="faq-buttons">
      <button class="faq-btn" data-q="What are the library hours?">🕐 Library hours</button>
      <button class="faq-btn" data-q="What is the borrowing limit?">📖 Borrowing limit</button>
      <button class="faq-btn" data-q="How do I renew a book?">🔄 Renew a book</button>
      <button class="faq-btn" data-q="What are the overdue fines?">💰 Overdue fines</button>
      <button class="faq-btn" data-q="Where are the library locations?">📍 Locations</button>
      <button class="faq-btn" data-q="How do I get a library membership?">🎫 Membership</button>
    </div>
  </div>
  <div id="input-area">
    <label for="message-input" class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Type your message</label>
    <input type="text" id="message-input" placeholder="Ask me about the library..." autocomplete="off" aria-label="Type your message">
    <button id="send-btn" aria-label="Send message" disabled>&#10148;</button>
  </div>
</div>

<script>
(function() {
  "use strict";

  var params = new URLSearchParams(window.location.search);
  var API_BASE = params.get("api") || "";
  if (!API_BASE) {
    var pathParts = window.location.pathname.split("/static/");
    API_BASE = pathParts[0] || "";
  }

  // --- Session persistence ---
  var STORE_KEY = "hero_chat";
  var STORE_VER = 3;
  var stored = {};
  try {
    var raw = JSON.parse(sessionStorage.getItem(STORE_KEY)) || {};
    if (raw.ver === STORE_VER) stored = raw;
  } catch(e) {}

  var sessionId = stored.sid || generateUUID();
  var chatHistory = stored.history || [];

  function generateUUID() {
    if (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function") return crypto.randomUUID();
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c) {
      var r = (Math.random() * 16) | 0;
      return (c === "x" ? r : (r & 0x3) | 0x8).toString(16);
    });
  }

  function saveState() {
    try {
      sessionStorage.setItem(STORE_KEY, JSON.stringify({
        ver: STORE_VER, sid: sessionId, history: chatHistory.slice(-40)
      }));
    } catch(e) {}
  }

  // --- DOM refs ---
  var messagesEl = document.getElementById("messages");
  var inputEl = document.getElementById("message-input");
  var sendBtn = document.getElementById("send-btn");

  // --- Restore previous messages ---
  if (chatHistory.length > 0) {
    var welcome = messagesEl.querySelector(".welcome");
    if (welcome) welcome.remove();
    chatHistory.forEach(function(m) { addMessageRaw(m.text, m.role); });
    setTimeout(function() { messagesEl.scrollTop = messagesEl.scrollHeight; }, 50);
    setTimeout(function() { messagesEl.scrollTop = messagesEl.scrollHeight; }, 200);
  }

  inputEl.addEventListener("input", function() {
    sendBtn.disabled = !inputEl.value.trim();
  });

  inputEl.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !sendBtn.disabled) { e.preventDefault(); sendMessage(); }
  });

  sendBtn.addEventListener("click", sendMessage);

  // FAQ buttons
  messagesEl.addEventListener("click", function(e) {
    var btn = e.target.closest ? e.target.closest(".faq-btn") : null;
    if (!btn && e.target.classList && e.target.classList.contains("faq-btn")) btn = e.target;
    if (!btn) return;
    e.preventDefault();
    var question = btn.getAttribute("data-q");
    if (!question) return;
    inputEl.value = question;
    sendBtn.disabled = false;
    sendMessage();
  });

  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function addMessageRaw(text, role) {
    var div = document.createElement("div");
    div.className = "message " + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function addMessage(text, role) {
    addMessageRaw(text, role);
    chatHistory.push({ text: text, role: role });
    saveState();
  }

  function showTyping() {
    var div = document.createElement("div");
    div.className = "typing-indicator"; div.id = "typing";
    div.innerHTML = "<span></span><span></span><span></span>";
    messagesEl.appendChild(div); scrollToBottom();
  }

  function hideTyping() { var el = document.getElementById("typing"); if (el) el.remove(); }

  function showError(text) {
    var div = document.createElement("div");
    div.className = "message error"; div.textContent = text;
    messagesEl.appendChild(div); scrollToBottom();
  }

  function sendMessage() {
    var text = inputEl.value.trim();
    if (!text) return;
    var welcome = messagesEl.querySelector(".welcome");
    if (welcome) welcome.remove();
    var faqDiv = document.getElementById("faq-buttons");
    if (faqDiv) faqDiv.remove();
    addMessage(text, "user");
    inputEl.value = ""; sendBtn.disabled = true; inputEl.disabled = true;
    showTyping();
    fetch(API_BASE + "/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, session_id: sessionId })
    })
    .then(function(res) {
      if (!res.ok) return res.json().then(function(d) { throw new Error(d.error || "Request failed"); });
      return res.json();
    })
    .then(function(data) { hideTyping(); addMessage(data.reply, "bot"); })
    .catch(function(err) {
      hideTyping();
      if (err.message === "Failed to fetch" || err.name === "TypeError") {
        showError("Oops, I can't connect right now 😅 Check your internet and try again in a moment!");
      } else { showError(err.message || "Something went wrong."); }
    })
    .finally(function() { inputEl.disabled = false; inputEl.focus(); sendBtn.disabled = !inputEl.value.trim(); });
  }

  inputEl.focus();

  // --- Librarian handoff polling ---
  var handoffActive = false;
  var lastPollTs = 0;
  var pollTimer = null;

  function startHandoffPolling() {
    if (pollTimer) return;
    handoffActive = true;
    pollTimer = setInterval(pollHandoff, 3000);
  }

  function stopHandoffPolling() {
    handoffActive = false;
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  }

  function pollHandoff() {
    fetch(API_BASE + "/api/poll/" + encodeURIComponent(sessionId) + "?since=" + lastPollTs)
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.messages && d.messages.length > 0) {
          d.messages.forEach(function(m) {
            if (m.role === "librarian" && m.timestamp > lastPollTs) {
              addMessage("👩‍💼 Librarian: " + m.content, "bot");
            } else if (m.role === "assistant" && m.timestamp > lastPollTs) {
              addMessage(m.content, "bot");
            }
            if (m.timestamp > lastPollTs) lastPollTs = m.timestamp;
          });
        }
        if (!d.handoff_active && handoffActive) {
          stopHandoffPolling();
          showHandoffRating();
        }
      })
      .catch(function() {});
  }

  function showHandoffRating() {
    var rateDiv = document.createElement("div");
    rateDiv.className = "message bot";
    rateDiv.style.cssText = "text-align:center;max-width:95%;padding:14px 18px;white-space:normal";
    rateDiv.innerHTML =
      '<div style="margin-bottom:10px;font-weight:600">How satisfied were you with the librarian\'s assistance?</div>' +
      '<div style="display:flex;flex-direction:column;gap:6px;align-items:stretch">' +
      '<button class="rate-btn" data-rating="4" style="background:#fff;border:1px solid #ccc;border-radius:18px;padding:8px 16px;font-size:0.88rem;cursor:pointer;text-align:left">😄 4 — Very Satisfied</button>' +
      '<button class="rate-btn" data-rating="3" style="background:#fff;border:1px solid #ccc;border-radius:18px;padding:8px 16px;font-size:0.88rem;cursor:pointer;text-align:left">🙂 3 — Satisfied</button>' +
      '<button class="rate-btn" data-rating="2" style="background:#fff;border:1px solid #ccc;border-radius:18px;padding:8px 16px;font-size:0.88rem;cursor:pointer;text-align:left">😐 2 — Moderately Satisfied</button>' +
      '<button class="rate-btn" data-rating="1" style="background:#fff;border:1px solid #ccc;border-radius:18px;padding:8px 16px;font-size:0.88rem;cursor:pointer;text-align:left">😞 1 — Not Satisfied</button>' +
      '</div>';
    messagesEl.appendChild(rateDiv);
    scrollToBottom();
    rateDiv.querySelectorAll(".rate-btn").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var rating = parseInt(btn.getAttribute("data-rating"));
        var labels = { 4: "Very Satisfied 😄", 3: "Satisfied 🙂", 2: "Moderately Satisfied 😐", 1: "Not Satisfied 😞" };
        rateDiv.innerHTML = '<div style="color:#555">Thanks for your feedback! You rated: <strong>' + (labels[rating] || rating) + '</strong></div>';
        fetch(API_BASE + "/api/rate-handoff", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, rating: rating })
        }).catch(function() {});
      });
    });
  }

  // Detect handoff from bot response
  var _origAddMessage = addMessage;
  addMessage = function(text, role) {
    _origAddMessage(text, role);
    if (role === "bot" && text && text.indexOf("notified a librarian") !== -1) {
      lastPollTs = Date.now() / 1000;
      startHandoffPolling();
    }
  };

  // Resume polling if handoff was active before page load
  (function() {
    fetch(API_BASE + "/api/poll/" + encodeURIComponent(sessionId) + "?since=0")
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.handoff_active) {
          lastPollTs = Date.now() / 1000;
          startHandoffPolling();
        }
      })
      .catch(function() {});
  })();

  window.addEventListener("beforeunload", function() {
    stopHandoffPolling();
    if (sessionId) {
      var blob = new Blob(
        [JSON.stringify({ message: "", session_id: sessionId })],
        { type: "application/json" }
      );
      navigator.sendBeacon(API_BASE + "/api/close-session", blob);
    }
  });
})();
</script>
</body>
</html>
